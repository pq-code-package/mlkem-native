name: Base
permissions:
  contents: read
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quickcheck-windows-arm64:
    strategy:
      fail-fast: false
      matrix:
        opt: [0, 1]
    name: Quickcheck windows-11-arm (OPT=${{ matrix.opt }})
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: arm64
      - name: Build test
        shell: powershell
        run: |
          # print compiler version
          cl
          nmake /f ./Makefile.Microsoft_nmake OPT=${{ matrix.opt }} quickcheck
