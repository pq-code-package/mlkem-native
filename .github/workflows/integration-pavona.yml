name: Pavona
permissions:
  contents: read
on:
  workflow_call:
  workflow_dispatch:

env:
  AWS_ROLE: arn:aws:iam::559050233797:role/mlkem-c-aarch64-gh-action
  AWS_REGION: us-east-1
  AMI_UBUNTU_X86_64: ami-05cf1e9f73fbad2e2 # Ubuntu 24.04 LTS (2026-04-24)

jobs:
  start-ec2-runner:
    name: Start EC2 instance
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    if: ${{ always() && github.repository_owner == 'pq-code-package' && !github.event.pull_request.head.repo.fork }} # Make this step non-cancellable to avoid orphaned instances
    outputs:
      label: ${{ steps.start-ec2-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start EC2 runner
        id: start-ec2-runner
        uses: machulav/ec2-github-runner@343a1b2ae682e681c3cec9a235d882da17ff04ef # v2.6.1
        with:
          mode: start
          github-token: ${{ secrets.AWS_GITHUB_TOKEN }}
          ec2-instance-type: c7i.2xlarge
          ec2-volume-size: 32
          availability-zones-config: >-
            [{"imageId":"${{ env.AMI_UBUNTU_X86_64 }}","subnetId":"subnet-07b2729e5e065962f","securityGroupId":"sg-0ab2e297196c8c381"},
             {"imageId":"${{ env.AMI_UBUNTU_X86_64 }}","subnetId":"subnet-0c7739cbd02c2c1d2","securityGroupId":"sg-0ab2e297196c8c381"},
             {"imageId":"${{ env.AMI_UBUNTU_X86_64 }}","subnetId":"subnet-0d69987f97f50fc1d","securityGroupId":"sg-0ab2e297196c8c381"},
             {"imageId":"${{ env.AMI_UBUNTU_X86_64 }}","subnetId":"subnet-0d077bf47a0eef46e","securityGroupId":"sg-0ab2e297196c8c381"},
             {"imageId":"${{ env.AMI_UBUNTU_X86_64 }}","subnetId":"subnet-0019f164593f6df43","securityGroupId":"sg-0ab2e297196c8c381"},
             {"imageId":"${{ env.AMI_UBUNTU_X86_64 }}","subnetId":"subnet-0f0d1e7667a264a0e","securityGroupId":"sg-0ab2e297196c8c381"}]

  pavona_test:
    name: Pavona ML-KEM Test (verilator)
    needs: start-ec2-runner
    if: ${{ github.repository_owner == 'pq-code-package' && !github.event.pull_request.head.repo.fork }}
    runs-on: ${{ needs.start-ec2-runner.outputs.label }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pavona
        with:
          pavona-repository: https://github.com/pavona/pavona
          pavona-commit: release/2026.05.p0

      - name: Patch mlkem-native dependency
        run: |
          cd "$PAVONA_DIR"

          # Calculate sha256 of mlkem-native at the new commit
          SHA256=$(curl -sL "https://github.com/$GITHUB_REPOSITORY/archive/$GITHUB_SHA.tar.gz" | sha256sum | cut -d' ' -f1)

          # Update the extensions.bzl file with new commit and sha256
          sed -i \
            -e "s|sha256 = \"[^\"]*\"|sha256 = \"$SHA256\"|" \
            -e "s|strip_prefix = \"mlkem-native-[^\"]*\"|strip_prefix = \"mlkem-native-$GITHUB_SHA\"|" \
            -e "s|archive/[^/]*.tar.gz|archive/$GITHUB_SHA.tar.gz|" \
            third_party/mlkem_native/extensions.bzl

          # Show the changes
          echo "=== Patched extensions.bzl ==="
          cat third_party/mlkem_native/extensions.bzl

      - name: Patch functest to only test deterministic API
        run: |
          cd "$PAVONA_DIR"
          # speed-up tests in CI by only running deterministic tests
          git apply "$GITHUB_WORKSPACE/integration/pavona/derand-only.patch"

      - name: Run mlkem functest
        run: |
          cd "$PAVONA_DIR"
          # Run the test
          ./bazelisk.sh test \
            --test_output=streamed \
            --disk_cache="$BAZEL_CACHE_DIR" \
            --registry=https://raw.githubusercontent.com/bazelbuild/bazel-central-registry/main/ \
            //sw/device/tests/crypto:mlkem_functest_sim_verilator

  stop-ec2-runner:
    name: Stop EC2 instance
    permissions:
      contents: 'read'
      id-token: 'write'
    needs:
      - start-ec2-runner
      - pavona_test # required to wait when the main job is done
    runs-on: ubuntu-latest
    if: ${{ always() && github.repository_owner == 'pq-code-package' && !github.event.pull_request.head.repo.fork }} # required to stop the runner even if errors occur
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Stop EC2 runner
        uses: machulav/ec2-github-runner@343a1b2ae682e681c3cec9a235d882da17ff04ef # v2.6.1
        with:
          mode: stop
          github-token: ${{ secrets.AWS_GITHUB_TOKEN }}
          label: ${{ needs.start-ec2-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-ec2-runner.outputs.ec2-instance-id }}
