  macos-gcc:
    name: macOS gcc-${{ matrix.gcc.version }} (${{ matrix.target.arch }}, ${{ matrix.cflags }})
    strategy:
      fail-fast: false
      matrix:
        gcc:
          - { version: '11', c23: false }
          - { version: '12', c23: false }
          - { version: '13', c23: false }
          - { version: '14', c23: true  }
        cflags: ['-O0', '-Os', '-O3']
        target:
#          - { runner: macos-latest,   arch: aarch64 }
          - { runner: macos-15-intel, arch: x86_64  }
    runs-on: ${{ matrix.target.runner }}
    env:
      CC: gcc-${{ matrix.gcc.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install gcc-${{ matrix.gcc.version }}
        uses: ./.github/actions/setup-brew
        with:
          packages: gcc@${{ matrix.gcc.version }}
      - name: build + test (default)
        uses: ./.github/actions/multi-functest
        with:
          nix-shell: ""
          custom_shell: bash
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          compile_mode: native
          func: true
          kat: false
          acvp: false
          wycheproof: false
          examples: true
          opt: all
          cflags: "${{ matrix.cflags }}"
      - name: build + test (C90)
        uses: ./.github/actions/multi-functest
        with:
          nix-shell: ""
          custom_shell: bash
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          compile_mode: native
          func: true
          kat: false
          acvp: false
          wycheproof: false
          examples: true
          opt: all
          cflags: "-std=c90 ${{ matrix.cflags }}"
      - name: build + test (C99)
        uses: ./.github/actions/multi-functest
        with:
          nix-shell: ""
          custom_shell: bash
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          compile_mode: native
          func: true
          kat: false
          acvp: false
          wycheproof: false
          examples: true
          opt: all
          cflags: "-std=c99 ${{ matrix.cflags }}"
      - name: build + test (C11)
        uses: ./.github/actions/multi-functest
        with:
          nix-shell: ""
          custom_shell: bash
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          compile_mode: native
          func: true
          kat: false
          acvp: false
          wycheproof: false
          examples: true
          opt: all
          cflags: "-std=c11 ${{ matrix.cflags }}"
      - name: build + test (C17)
        uses: ./.github/actions/multi-functest
        with:
          nix-shell: ""
          custom_shell: bash
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          compile_mode: native
          func: true
          kat: false
          acvp: false
          wycheproof: false
          examples: true
          opt: all
          cflags: "-std=c17 ${{ matrix.cflags }}"
      - name: build + test (C23)
        if: ${{ matrix.gcc.c23 }}
        uses: ./.github/actions/multi-functest
        with:
          nix-shell: ""
          custom_shell: bash
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          compile_mode: native
          func: true
          kat: false
          acvp: false
          wycheproof: false
          examples: true
          opt: all
          cflags: "-std=c23 ${{ matrix.cflags }}"
