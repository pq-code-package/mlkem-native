# The FLEXMEM setup used by the NUCLEO runner repurposes the low AXISRAM
# window, so keep the Zephyr image above it and leave fixed host buffers after
# the linked image.
CONFIG_SRAM_BASE_ADDRESS=0x34080000
CONFIG_SRAM_SIZE=192

# Component benchmarks keep several 8 KiB scratch buffers on the main stack.
CONFIG_MAIN_STACK_SIZE=65536

# Test stdout is wrapped by shim_nucleo_n657x0_q.c and emitted on ITM/SWO.
CONFIG_STDOUT_CONSOLE=n
CONFIG_UART_CONSOLE=n
